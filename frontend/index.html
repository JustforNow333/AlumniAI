<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alumni AI — Prototype</title>
<link rel="stylesheet" href="theme.css" />
<style>
  html, body { margin: 0; min-height: 100%; background: #131022; overflow-x: hidden; }
  body { overflow-y: auto; }
  #root { min-height: 100vh; width: 100vw; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>

<!-- ============================================================
     BACKEND CONFIG
       useApi:true  → POSTs to <apiBase>/api/upload and /api/ask
       useApi:false → runs fully in-browser with CSV demo mode only
     Leave apiBase empty when Flask serves this frontend from the same origin.
     ============================================================ -->
<script>
  window.ALUMNI_CONFIG = {
    useApi: true,
    apiBase: ""
  };
</script>

<script src="sample-data.jsx"></script>
<script type="text/babel" src="kit.jsx"></script>
<script type="text/babel" src="engine.jsx"></script>
<script type="text/babel" src="api.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
